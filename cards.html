<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunaria — Карты дня</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: 'EB Garamond', Georgia, serif;
        color: #d9d3ec;
        background: radial-gradient(ellipse at 50% 0%, #16103e, #080b22 62%);
        min-height: 100vh;
    }
    nav {
        display: flex; gap: 34px; align-items: center;
        padding: 22px 54px;
        background: rgba(8,11,34,0.9);
        border-bottom: 1px solid rgba(198,166,100,0.18);
        position: sticky; top: 0; z-index: 10;
    }
    nav .logo { font-family: 'Cormorant Garamond', serif; font-size: 26px; letter-spacing: 6px; color: #c6a664; margin-right: auto; font-weight: 500; text-transform: uppercase; }
    nav a { text-decoration: none; color: #9b95bd; letter-spacing: 2px; font-size: 14px; text-transform: uppercase; padding-bottom: 3px; border-bottom: 1px solid transparent; }
    nav a:hover, nav a.active { color: #c6a664; border-bottom-color: #c6a664; }

    h1 { font-family: 'Cormorant Garamond', serif; text-align: center; font-weight: 400; letter-spacing: 5px; text-transform: uppercase; color: #efeaff; margin: 48px 0 6px; font-size: 38px; }
    .sub { text-align: center; color: #837cab; margin-bottom: 44px; font-size: 16px; font-style: italic; }
    .sub b { color: #c6a664; font-style: normal; }

    .deck { display: flex; gap: 26px; justify-content: center; flex-wrap: wrap; padding: 0 20px 70px; perspective: 1400px; }
    .card { width: 158px; height: 252px; cursor: pointer; position: relative; transition: transform 0.25s; }
    .card.sel { transform: translateY(-16px); }
    .card.sel .inner { box-shadow: 0 0 24px rgba(198,166,100,0.55); border-radius: 10px; }
    .inner { position: absolute; inset: 0; transform-style: preserve-3d; transition: transform 0.7s cubic-bezier(.2,.7,.2,1); }
    .card.flipped .inner { transform: rotateY(180deg); }

    .side {
        position: absolute; inset: 0; backface-visibility: hidden;
        border-radius: 10px; border: 1px solid rgba(198,166,100,0.7);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        padding: 18px; text-align: center;
    }
    .back {
        background:
            radial-gradient(circle at 50% 50%, rgba(198,166,100,0.10), transparent 60%),
            linear-gradient(160deg, #14102f, #1b1440);
    }
    .back .frame { width: 78%; height: 86%; border: 1px solid rgba(198,166,100,0.35); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .back .frame span { font-family: 'Cormorant Garamond', serif; font-size: 30px; color: rgba(198,166,100,0.65); }

    .front { transform: rotateY(180deg); background: linear-gradient(165deg, #1c1547, #100b30); }
    .front .num { font-family: 'Cormorant Garamond', serif; color: #c6a664; letter-spacing: 4px; font-size: 30px; }
    .front .line { width: 38px; height: 1px; background: rgba(198,166,100,0.6); margin: 12px 0; }
    .front .name { font-family: 'Cormorant Garamond', serif; letter-spacing: 2px; font-size: 22px; color: #efeaff; text-transform: uppercase; }
    .front .mean { font-size: 13px; color: #948dba; margin-top: 12px; line-height: 1.5; font-style: italic; }

    .tip { text-align: center; color: #837cab; padding-bottom: 60px; font-size: 15px; font-style: italic; }
</style>
</head>
<body>
    <nav>
        <span class="logo">Lunaria</span>
        <a href="index.html">Главная</a>
        <a href="cards.html" class="active">Карты дня</a>
        <a href="booking.html">Запись</a>
    </nav>

    <h1>Вытяни свою карту</h1>
    <p class="sub">Клик по карте — перевернуть. Стрелки <b>← →</b> выбирают, <b>Enter</b> открывает, <b>Esc</b> закрывает все.</p>

    <div class="deck" id="deck"></div>

    <p class="tip">Сосредоточься на вопросе и доверься первому порыву.</p>

<script>
const arcana = [
    { num: "I", name: "Маг", mean: "Сила воли, начало, всё в твоих руках" },
    { num: "II", name: "Жрица", mean: "Интуиция, тайна, внутренний голос" },
    { num: "III", name: "Императрица", mean: "Изобилие, забота, творчество" },
    { num: "VII", name: "Колесница", mean: "Движение вперёд, контроль, победа" },
    { num: "XVII", name: "Звезда", mean: "Надежда, вдохновение, исцеление" },
    { num: "XVIII", name: "Луна", mean: "Иллюзии, сны, скрытые чувства" }
];

const deck = document.getElementById("deck");
let selected = 0;

arcana.forEach(function (a) {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML =
        '<div class="inner">' +
            '<div class="side back"><div class="frame"><span>&#10022;</span></div></div>' +
            '<div class="side front">' +
                '<div class="num">' + a.num + '</div>' +
                '<div class="line"></div>' +
                '<div class="name">' + a.name + '</div>' +
                '<div class="mean">' + a.mean + '</div>' +
            '</div>' +
        '</div>';
    card.addEventListener("click", function () { card.classList.toggle("flipped"); });
    deck.append(card);
});

const cards = deck.querySelectorAll(".card");

function highlight() {
    cards.forEach(function (c, i) { c.classList.toggle("sel", i === selected); });
}
highlight();

document.addEventListener("keydown", function (e) {
    if (e.key === "ArrowRight") { selected = (selected + 1) % cards.length; highlight(); }
    if (e.key === "ArrowLeft") { selected = (selected - 1 + cards.length) % cards.length; highlight(); }
    if (e.key === "Enter") { cards[selected].classList.toggle("flipped"); }
    if (e.key === "Escape") { cards.forEach(function (c) { c.classList.remove("flipped"); }); }
});
</script>
</body>
</html>
